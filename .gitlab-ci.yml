image: silex/emacs:28-ci

pages:
  stage: deploy
  script:
    - mkdir -p public/roam
    # 1. Export top-level files (index, todo, inbox)
    - emacs --batch --directory . --eval "(progn (setq org-html-validation-link nil) (setq org-html-postamble nil))" --funcall org-html-publish-to-html *.org
    - mv *.html public/
    # 2. Export Roam folder files
    - cd roam
    - emacs --batch --directory .. --eval "(progn (setq org-html-validation-link nil) (setq org-html-postamble nil))" --funcall org-html-publish-to-html *.org
    - mv *.html ../public/roam/
    - cd ..
    # 3. Copy any images
    - find . -name "*.png" -o -name "*.jpg" -exec cp --parents {} public/ \;
  artifacts:
    paths:
      - public
  only:
    - main
